<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <title>Frigia — Votre Chef IA Personnel | Recettes depuis votre frigo</title>
    <meta name="description" content="Prenez votre frigo en photo. Frigia génère des recettes personnalisées en quelques secondes grâce à l'IA. 4 jours gratuits, puis 7,99€/mois." />
    <meta name="keywords" content="Frigia, recettes IA, frigo, chef IA, recettes personnalisées, anti-gaspi" />
    <link rel="canonical" href="https://frigia.fr/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://frigia.fr/" />
    <meta property="og:title" content="Frigia — Votre Chef IA Personnel" />
    <meta property="og:description" content="Prenez votre frigo en photo. L'IA génère des recettes personnalisées en secondes. 4 jours gratuits." />
    <meta property="og:image" content="https://frigia.fr/apple-touch-icon.png" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Frigia" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Frigia — Votre Chef IA Personnel" />
    <meta name="twitter:description" content="Prenez votre frigo en photo. L'IA génère des recettes personnalisées en secondes." />
    <meta name="twitter:image" content="https://frigia.fr/apple-touch-icon.png" />

    <!-- JSON-LD structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Frigia",
      "url": "https://frigia.fr",
      "description": "Application IA qui génère des recettes personnalisées à partir des ingrédients de votre frigo.",
      "applicationCategory": "FoodApplication",
      "operatingSystem": "iOS, Android, Web",
      "offers": {
        "@type": "Offer",
        "price": "7.99",
        "priceCurrency": "EUR",
        "trialPeriodDays": 4
      },
      "inLanguage": "fr-FR",
      "author": {
        "@type": "Person",
        "name": "Pablo Cocilovo"
      }
    }
    </script>

    <!-- Theme -->
    <meta name="theme-color" content="#FF6B35" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Frigia" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
